# Thunderstore CLI config — `tcli build` / `tcli publish`.
# Keep versionNumber + the BepInExPack dependency in sync with thunderstore/manifest.json.
[config]
schemaVersion = "0.0.1"

[package]
namespace = "RyanEngineering"
name = "GlassPanel"
versionNumber = "1.8.0"
description = "F-35-style HMD glass panel on a second screen. Live telemetry over your LAN."
websiteUrl = "https://github.com/patrickryan01/no-glass-panel"
containsNsfwContent = false

[package.dependencies]
"BepInEx-BepInExPack" = "5.4.2305"

[build]
icon = "./thunderstore/icon.png"
readme = "./thunderstore/README.md"
outdir = "./thunderstore/build"

[[build.copy]]
source = "./mod/GlassPanel/bin/Release/net472/GlassPanel.dll"
target = "plugins/GlassPanel.dll"

[publish]
repository = "https://thunderstore.io"
communities = ["nuclear-option"]

[publish.categories]
nuclear-option = []
