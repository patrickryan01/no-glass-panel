<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Nuclear Option — Glass Panel</title>
<style>
  :root{
    --bg:#050a0c; --frame:#0a1418; --hair:#14313a; --hair2:#0f2630;
    --ink:#7df0cf; --dim:#356b62; --label:#6d928c; --nav:#38d0ff;
    --amber:#ffb020; --red:#ff5142; --green:#46e08a; --white:#dff5ef;
    --mono:ui-monospace,"Cascadia Mono","JetBrains Mono",Consolas,monospace;
    --sans:system-ui,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:radial-gradient(130% 100% at 50% -20%,#0a1c22 0%,var(--bg) 55%),var(--bg);
    color:var(--ink);font-family:var(--mono);font-variant-numeric:tabular-nums;overflow:hidden;-webkit-font-smoothing:antialiased}
  .wrap{height:100vh;height:100dvh;display:grid;gap:9px;padding:10px;
    grid-template-columns:0.92fr 1.55fr 0.92fr;grid-template-rows:auto 1fr auto auto;
    grid-template-areas:"status status status" "map hud radar" "rwr data weap" "comms comms comms";}

  .status{grid-area:status;display:flex;align-items:center;gap:15px;padding:6px 14px;
    border:1px solid var(--hair);border-radius:8px;background:linear-gradient(180deg,#091419,#060d10);overflow-x:auto}
  .brand{font-family:var(--sans);font-weight:700;letter-spacing:.24em;color:var(--white);font-size:12px;white-space:nowrap}
  .brand span{color:var(--dim)}
  .kv{display:flex;flex-direction:column;line-height:1.05;white-space:nowrap}
  .kv .k{font-family:var(--sans);font-size:8px;letter-spacing:.2em;color:var(--label);text-transform:uppercase}
  .kv .v{font-size:15px;color:var(--white)}
  .sp{flex:1}
  .lamp{font-family:var(--sans);font-size:9px;font-weight:800;letter-spacing:.1em;padding:5px 9px;border-radius:5px;
    border:1px solid #223038;color:#31424a;white-space:nowrap}
  .lamp.on.c{color:#0a0a0a;background:var(--amber);border-color:var(--amber);box-shadow:0 0 12px #ffb02099}
  .lamp.on.w{color:#180404;background:var(--red);border-color:var(--red);animation:bl 1s steps(1) infinite}
  @keyframes bl{50%{background:#3a0f0c;color:var(--red)}}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-family:var(--sans);
    font-size:10px;font-weight:700;letter-spacing:.1em;border:1px solid;white-space:nowrap}
  .pill .dot{width:7px;height:7px;border-radius:50%}
  .pill.sim{color:var(--amber);border-color:#5a4213;background:#20180a}.pill.sim .dot{background:var(--amber);box-shadow:0 0 7px var(--amber)}
  .pill.live{color:var(--green);border-color:#1c4a30;background:#0c2016}.pill.live .dot{background:var(--green);box-shadow:0 0 7px var(--green)}

  .hud{grid-area:hud;position:relative}
  #hud{display:block;width:100%;height:100%}

  .mfd{position:relative;border-radius:11px;background:linear-gradient(180deg,#091318,#050c0f);overflow:hidden;min-height:0}
  .mfd::before{content:"";position:absolute;inset:5px;border:1px solid var(--hair2);border-radius:8px;pointer-events:none}
  .mfd canvas{display:block;width:100%;height:100%}
  .mfd .cap{position:absolute;top:9px;left:13px;font-family:var(--sans);font-size:9px;letter-spacing:.2em;color:var(--label);text-transform:uppercase;z-index:2}
  .mfd .cap.r{left:auto;right:13px;color:var(--dim)}
  #map{grid-area:map}#radar{grid-area:radar}#rwr{grid-area:rwr}
  .bz{position:absolute;left:0;right:0;bottom:6px;z-index:2;display:flex;gap:9px;justify-content:center}
  .bz b{width:16px;height:4px;border-radius:2px;background:#17323a}
  .stby{position:absolute;inset:5px;display:none;align-items:center;justify-content:center;z-index:3;border-radius:8px;
    background:rgba(5,10,12,.55);color:#3a6b63;font-family:var(--sans);font-size:10px;letter-spacing:.2em}
  .stby.on{display:flex}

  .weap{grid-area:weap;border:1px solid var(--hair);border-radius:11px;background:linear-gradient(180deg,#091318,#060d10);
    padding:24px 13px 11px;position:relative;display:flex;flex-direction:column;gap:8px}
  .weap .cap{position:absolute;top:9px;left:13px;font-family:var(--sans);font-size:9px;letter-spacing:.2em;color:var(--label);text-transform:uppercase}
  .wsel{display:flex;justify-content:space-between;align-items:baseline}
  .wsel .n{font-size:18px;color:var(--amber);text-shadow:0 0 10px #ffb02044}
  .wsel .a{font-size:18px;color:var(--white)}.wsel .a small{font-size:10px;color:var(--label)}
  .wl{display:flex;flex-direction:column;gap:2px;overflow:auto;flex:1}
  .wr{display:flex;justify-content:space-between;font-size:12px;color:var(--dim);padding:3px 0;border-bottom:1px solid var(--hair2)}
  .wr.sel{color:var(--white)}.wr.sel b{color:var(--amber)}.wr b{color:var(--label);font-weight:400}
  .cm{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .cm .t{font-family:var(--sans);font-size:9px;letter-spacing:.12em;color:var(--label);display:flex;justify-content:space-between}
  .cm .t b{color:var(--white);font-family:var(--mono)}
  .bar{height:5px;border-radius:3px;background:#0c1c22;overflow:hidden;margin-top:4px}.bar>i{display:block;height:100%}

  .data{grid-area:data;border:1px solid var(--hair);border-radius:11px;background:linear-gradient(180deg,#091318,#060d10);
    display:grid;grid-template-columns:repeat(7,1fr);align-items:center}
  .cell{padding:8px 11px;border-right:1px solid var(--hair2);min-width:0}.cell:last-child{border-right:none}
  .cell .k{font-family:var(--sans);font-size:8px;letter-spacing:.16em;color:var(--label);text-transform:uppercase}
  .cell .v{font-size:18px;color:var(--white);margin-top:1px;white-space:nowrap}
  .cell .v small{font-size:10px;color:var(--label)}
  .cell .m{font-size:10px;color:var(--dim);margin-top:1px;white-space:nowrap}
  .cell .v.amber{color:var(--amber)}.cell .v.green{color:var(--green)}.cell .v.red{color:var(--red)}
  .machwrap{display:flex;align-items:center;gap:8px}#machDial{width:34px;height:34px;flex:0 0 auto}

  .comms{grid-area:comms;border:1px solid var(--hair);border-radius:8px;background:#070f12;display:flex;align-items:center;gap:12px;
    padding:5px 13px;min-height:34px;overflow:hidden}
  .comms .lbl{font-family:var(--sans);font-size:9px;letter-spacing:.2em;color:var(--label);text-transform:uppercase;flex:0 0 auto}
  .comms .log{display:flex;gap:22px;font-size:12px;color:var(--dim);white-space:nowrap;overflow:hidden;flex:1}
  .comms .log b{color:var(--nav);font-weight:600}
  .comms .log .empty{color:#2a4a48;font-style:italic}
  .comms input{flex:0 0 auto;width:min(38vw,300px);background:#04080a;border:1px solid var(--hair);border-radius:6px;
    color:var(--ink);font-family:var(--mono);font-size:12px;padding:5px 9px;outline:none}
  .comms input:focus{border-color:var(--nav)}
  .comms button{flex:0 0 auto;background:#0c2016;border:1px solid #1c4a30;color:var(--green);font-family:var(--sans);
    font-size:10px;font-weight:700;letter-spacing:.12em;padding:6px 13px;border-radius:6px;cursor:pointer}
  .comms button:active{background:#123024}

  #damage{position:fixed;right:12px;bottom:52px;width:190px;height:140px;z-index:20;display:none;
    border:1px solid var(--hair);border-radius:10px;background:#070f12}
  #damage.show{display:block}

  .ctrl{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
  .ctrl button{background:#0c1820;border:1px solid var(--hair);border-radius:7px;color:var(--ink);
    font-family:var(--sans);font-size:12px;font-weight:700;letter-spacing:.05em;padding:10px 6px;cursor:pointer;
    -webkit-tap-highlight-color:transparent;touch-action:manipulation}
  .ctrl button:active{background:#123024;border-color:var(--green);color:var(--green)}
  /* per-device single-module views: ?view=hud|map|radar|rwr */
  body.view-hud .wrap>*:not(.hud),body.view-map .wrap>*:not(#map),
  body.view-radar .wrap>*:not(#radar),body.view-rwr .wrap>*:not(#rwr){display:none}
  body[class*="view-"] .wrap{grid-template-columns:1fr!important;grid-template-rows:1fr!important;grid-template-areas:"solo"!important}
  body[class*="view-"] .wrap>*{grid-area:solo!important}
  @media (prefers-reduced-motion:reduce){.lamp.on.w{animation:none}}
  @media (max-width:880px){
    body{overflow:auto}
    .wrap{height:auto;min-height:100dvh;grid-template-columns:1fr;grid-auto-rows:minmax(180px,auto);
      grid-template-areas:"status" "hud" "data" "map" "radar" "rwr" "weap" "comms"}
    .hud{min-height:300px}.data{grid-template-columns:repeat(3,1fr);grid-auto-rows:auto}
    #damage{position:static;width:auto;height:150px;margin:0}
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="status">
    <div class="brand">NUCLEAR OPTION <span>· GLASS PANEL</span></div>
    <div class="kv"><span class="k">Callsign</span><span class="v">VIPER 1‑1</span></div>
    <div class="kv"><span class="k">Mission</span><span class="v" id="met">00:00</span></div>
    <div class="sp"></div>
    <div class="lamp c" id="lc">CAUTION</div>
    <div class="lamp w" id="lw">WARNING</div>
    <div class="lamp w" id="lrwr" style="display:none">MISSILE</div>
    <div class="pill sim" id="conn"><span class="dot"></span><span id="connTxt">SIM</span></div>
  </div>

  <div class="mfd" id="map"><div class="cap">Map</div><div class="cap r" id="mapS">40 KM</div><canvas id="mapCv"></canvas><div class="bz"><b></b><b></b><b></b><b></b><b></b></div></div>
  <div class="hud"><canvas id="hud"></canvas></div>
  <div class="mfd" id="radar"><div class="cap">Radar · RWS</div><div class="cap r" id="radarS">30 KM</div><canvas id="radarCv"></canvas><div class="bz"><b></b><b></b><b></b><b></b><b></b></div></div>

  <div class="mfd" id="rwr"><div class="cap">RWR</div><canvas id="rwrCv"></canvas><div class="stby" id="rwrStby">STANDBY</div></div>

  <div class="data">
    <div class="cell"><div class="k">Airspeed</div><div class="v"><span id="kts">—</span> <small>KT</small></div><div class="m" id="kph">— km/h</div></div>
    <div class="cell"><div class="k">Mach</div><div class="machwrap"><canvas id="machDial"></canvas><div class="v" id="mach">—</div></div></div>
    <div class="cell"><div class="k">Altitude</div><div class="v"><span id="alt">—</span> <small>FT</small></div><div class="m" id="altm">— m</div></div>
    <div class="cell"><div class="k">Vert Spd</div><div class="v" id="vs">—</div><div class="m" id="vsm">— m/s</div></div>
    <div class="cell"><div class="k">G · Peak</div><div class="v" id="gv">—</div><div class="m">AoA <span id="aoaS">—</span>°</div></div>
    <div class="cell"><div class="k">Throttle · Eng</div><div class="v" id="thr">—</div><div class="m" id="eng">— kN</div></div>
    <div class="cell"><div class="k">Target · Vc</div><div class="v" id="tgt">—</div><div class="m" id="fuel">FUEL —</div></div>
  </div>

  <div class="weap">
    <div class="cap">Stores</div>
    <div class="wsel"><span class="n" id="wN">—</span><span class="a"><span id="wA">0</span> <small id="wU"></small></span></div>
    <div class="wl" id="wL"></div>
    <div class="cm">
      <div><div class="t">FLARE <b id="flN">—</b></div><div class="bar"><i id="flB" style="background:linear-gradient(90deg,#ff7a2e,#ffb020)"></i></div></div>
      <div><div class="t">CHAFF <b id="chN">—</b></div><div class="bar"><i id="chB" style="background:linear-gradient(90deg,#2e9dff,#7ad6ff)"></i></div></div>
    </div>
    <div class="ctrl">
      <button data-cmd="wpn-">◀ WPN</button><button data-cmd="wpn+">WPN ▶</button>
      <button data-cmd="gear">GEAR</button><button data-cmd="cm">FLARE</button>
    </div>
  </div>

  <div class="comms"><span class="lbl">Comms</span><div class="log" id="commsLog"><span class="empty">— standby —</span></div><input id="chatIn" placeholder="message → game chat…" autocomplete="off" maxlength="200"><button id="chatSend">SEND</button></div>
</div>

<canvas id="damage"></canvas>

<script>
/* telemetry contract — docs/TELEMETRY.md. Mod sends imperial (kt/ft/ft-min); metric derived here. */
const S={live:false,ias:250,tas:265,mach:.4,alt:6000,agl:5820,vs:0,hdg:90,pitch:0,roll:0,aoa:5,g:1,throttle:.7,engine:120,
  gear:false,fuelKg:4200,fuelMax:5000,fuelSec:1900,weaponIndex:0,
  weapons:[{name:'GAU CANNON',ammo:480,unit:'RDS'},{name:'AIM‑54C',ammo:4,unit:'MSL'},{name:'AGM STRIKE',ammo:6,unit:'MSL'},{name:'MK82 ×8',ammo:8,unit:'BMB'},{name:'☢ NUCLEAR',ammo:1,unit:'SPL'}],
  flares:60,chaff:60,flaresMax:60,chaffMax:60,contacts:[],rwr:[],chat:[],damage:null,datalink:[],nav:null,
  inputs:{pitch:0,roll:0,yaw:0,throttle:.7},met:0,caution:false,warning:false,
  peakG:1,_hasRWR:false,_hasChat:false,_lockRng:null,_lockT:0,vc:0};

function applyTelemetry(t){Object.assign(S,t);if(t.inputs)S.inputs=Object.assign(S.inputs,t.inputs);
  if(t.rwr!==undefined)S._hasRWR=true;if(t.chat!==undefined)S._hasChat=true;S.live=true;setConn(true);}
function setConn(l){const p=document.getElementById('conn');p.className='pill '+(l?'live':'sim');document.getElementById('connTxt').textContent=l?'LIVE':'SIM';}
function connectLive(u){try{const ws=new WebSocket(u);S._ws=ws;ws.onopen=()=>setConn(true);ws.onclose=()=>{S.live=false;setConn(false);if(!S._rc)S._rc=setTimeout(()=>{S._rc=null;connectLive(u);},2000);};
  ws.onmessage=e=>{try{applyTelemetry(JSON.parse(e.data));}catch(_){}};}catch(_){}}

/* sim */
let last=performance.now();
function seed(){S.contacts=[{brg:104,rng:14200,alt:2000,spd:0,type:'H',name:'SAM',locked:true},{brg:60,rng:9800,alt:8500,spd:280,type:'H',name:'FS‑12'},{brg:250,rng:16000,alt:9000,spd:240,type:'F',name:'T/A‑30'},{brg:330,rng:7200,alt:400,spd:60,type:'U',name:'?'}];
  S.rwr=[{brg:104,band:'A',lock:1},{brg:60,band:'A',lock:0},{brg:205,band:'S',lock:0}];
  S.chat=[{who:'BLUE HQ',msg:'Strike package cleared hot.'},{who:'VIPER 1‑2',msg:'Tied on, taking the trailer.'}];S.damage={hull:1,sections:{}};
  S.datalink=[{brg:80,rng:22000,type:'H'},{brg:140,rng:30000,type:'H'},{brg:280,rng:18000,type:'F'},{brg:20,rng:26000,type:'F'}];
  S.nav={name:'HOMEPLATE',brg:248,rng:38000};}
seed();
function sim(dt){const t=S.met+=dt;
  S.roll+=((26*Math.sin(t*.13)+8*Math.sin(t*.41))-S.roll)*Math.min(1,dt*1.6);
  S.pitch+=((6*Math.sin(t*.09)+2*Math.sin(t*.7))-S.pitch)*Math.min(1,dt*1.6);
  S.hdg=(S.hdg+S.roll*.09*dt+360)%360;S.throttle=.72+.24*Math.sin(t*.05);S.engine=60+S.throttle*120;
  S.ias+=((170+S.throttle*260-S.pitch*5)-S.ias)*Math.min(1,dt*.6);S.tas=S.ias*1.06;S.mach=S.ias/645;
  S.vs=Math.sin(S.pitch*Math.PI/180)*S.ias*101;S.alt=Math.max(400,S.alt+S.vs*dt/60);S.agl=Math.max(50,S.alt-180);
  S.g=Math.max(.2,1/Math.cos(S.roll*Math.PI/180))+(Math.abs(S.pitch)>4?.3:0);
  S.aoa=Math.max(0,5-S.pitch*.25+(S.g-1)*2.4);S.fuelKg=Math.max(0,S.fuelKg-S.throttle*.5*dt);S.fuelSec=S.fuelKg/Math.max(.3,S.throttle)*1.6;
  if(Math.floor(t/11)!==Math.floor((t-dt)/11))S.weaponIndex=(S.weaponIndex+1)%S.weapons.length;
  if(Math.floor(t/6.5)!==Math.floor((t-dt)/6.5)){if(S.flares>0)S.flares-=2;if(S.chaff>0)S.chaff-=2;}if(S.flares<=0){S.flares=60;S.chaff=60;}
  S.contacts.forEach(c=>{c.rng-=(c.type==='H'?70:15)*dt;if(c.rng<1200)c.rng=15000+Math.random()*3000;});
  S.rwr[0].lock=S.contacts[0].rng<8000?2:1;S.inputs.roll=Math.max(-1,Math.min(1,S.roll/35));S.inputs.pitch=Math.max(-1,Math.min(1,S.pitch/15));
  S.inputs.yaw=.15*Math.sin(t*.6);S.inputs.throttle=S.throttle;S.caution=(S.fuelSec<300)||(S.aoa>15);S.warning=(S.aoa>18)||(S.agl<150);
  S._hasRWR=true;S._hasChat=true;}

/* shared */
const MF='ui-monospace,"Cascadia Mono",Consolas,monospace',SF='system-ui,sans-serif';
const C='#7df0cf',DIM='#356b62',LBL='#6d928c',NAV='#38d0ff',AMBER='#ffb020',RED='#ff5142',GREEN='#46e08a',D2R=Math.PI/180;
const KT2KPH=1.852,FT2M=.3048,FTM2MS=.00508;
function fit(id){const cv=document.getElementById(id),r=Math.min(2,devicePixelRatio||1),b=cv.getBoundingClientRect();
  cv.width=Math.max(1,b.width*r);cv.height=Math.max(1,b.height*r);const x=cv.getContext('2d');x.setTransform(r,0,0,r,0,0);return{x,w:b.width,h:b.height};}

/* HUD — compact horizon + bank pointer + steering + meatball fold + dual mini-readouts */
function hud(){const{x,w,h}=fit('hud');x.clearRect(0,0,w,h);
  const cx=w*.5,cy=h*.5,ppd=Math.max(3.0,h/42);              // smaller horizon: less px/deg
  // bank pointer arc (top)
  x.strokeStyle=DIM;x.lineWidth=1;x.beginPath();x.arc(cx,cy,Math.min(96,h*.34),-Math.PI*0.70,-Math.PI*0.30);x.stroke();
  [-45,-30,-20,-10,0,10,20,30,45].forEach(a=>{const rr=Math.min(96,h*.34),ra=a*D2R-Math.PI/2,l=a%30===0?9:5;
    x.beginPath();x.moveTo(cx+Math.cos(ra)*rr,cy+Math.sin(ra)*rr);x.lineTo(cx+Math.cos(ra)*(rr-l),cy+Math.sin(ra)*(rr-l));x.stroke();});
  const bp=-S.roll*D2R-Math.PI/2,br=Math.min(96,h*.34)-2;x.fillStyle=AMBER;x.beginPath();
  x.moveTo(cx+Math.cos(bp)*br,cy+Math.sin(bp)*br);x.lineTo(cx+Math.cos(bp-.035)*(br+9),cy+Math.sin(bp-.035)*(br+9));x.lineTo(cx+Math.cos(bp+.035)*(br+9),cy+Math.sin(bp+.035)*(br+9));x.fill();
  // horizon + ladder (compact clip)
  x.save();x.beginPath();x.rect(cx-w*.20,cy-h*.24,w*.40,h*.48);x.clip();
  x.translate(cx,cy);x.rotate(S.roll*D2R);x.translate(0,S.pitch*ppd);
  x.strokeStyle=C;x.lineWidth=1.5;x.globalAlpha=.95;x.beginPath();x.moveTo(-w*.34,0);x.lineTo(-30,0);x.moveTo(30,0);x.lineTo(w*.34,0);x.stroke();
  x.font='10px '+MF;x.fillStyle=C;x.textAlign='center';
  for(let p=-30;p<=30;p+=10){if(!p)continue;const y=-p*ppd,lw=54;x.globalAlpha=.7;
    x.beginPath();if(p>0){x.moveTo(-lw/2,y);x.lineTo(lw/2,y);}else{x.setLineDash([8,6]);x.moveTo(-lw/2,y);x.lineTo(lw/2,y);x.stroke();x.setLineDash([]);}x.stroke();
    x.beginPath();x.moveTo(-lw/2,y);x.lineTo(-lw/2,y+(p>0?6:-6));x.moveTo(lw/2,y);x.lineTo(lw/2,y+(p>0?6:-6));x.stroke();
    x.fillText(Math.abs(p),-lw/2-11,y+3);x.fillText(Math.abs(p),lw/2+11,y+3);}
  x.restore();
  // flight path marker
  const fy=cy+(S.vs<0?15:-15)*Math.min(1,Math.abs(S.vs)/2500);x.globalAlpha=1;x.strokeStyle=C;x.lineWidth=1.6;
  x.beginPath();x.arc(cx,fy,6,0,7);x.moveTo(cx-6,fy);x.lineTo(cx-13,fy);x.moveTo(cx+6,fy);x.lineTo(cx+13,fy);x.moveTo(cx,fy-6);x.lineTo(cx,fy-12);x.stroke();
  // boresight
  x.strokeStyle=AMBER;x.lineWidth=2;x.beginPath();
  x.moveTo(cx-38,cy);x.lineTo(cx-13,cy);x.lineTo(cx-6,cy+7);x.moveTo(cx+38,cy);x.lineTo(cx+13,cy);x.lineTo(cx+6,cy+7);x.stroke();
  // left rail: airspeed(KT) box + dual km/h + Mach + G + AoA
  const bx=w*.13;box(x,bx,cy,Math.round(S.ias),'KT');
  x.fillStyle=DIM;x.font='9px '+MF;x.textAlign='center';x.fillText(Math.round(S.ias*KT2KPH)+' kph',bx,cy+24);
  win(x,bx,cy+42,'M '+S.mach.toFixed(2));win(x,bx,cy-38,'α '+S.aoa.toFixed(1));win(x,bx,cy-58,'G '+S.g.toFixed(1));
  // right rail: altitude(FT) + dual m + radar alt
  const ax=w*.87;box(x,ax,cy,Math.round(S.alt),'FT');
  x.fillStyle=DIM;x.font='9px '+MF;x.textAlign='center';x.fillText(Math.round(S.alt*FT2M)+' m',ax,cy+24);
  win(x,ax,cy+42,'R '+Math.round(S.agl));
  // heading scale (top center, above bank arc)
  hdgScale(x,cx,16,S.hdg,w);
  // meatball (fold): small vertical glideslope ball just left of boresight, brighter on approach
  meat(x,cx-70,cy,h);
  // target steering caret + Vc (locked target)
  steer(x,cx,cy,h);
}
function box(x,px,cy,v,l){x.fillStyle='#04080a';x.strokeStyle=C;x.lineWidth=1.5;x.fillRect(px-33,cy-12,66,24);x.strokeRect(px-33,cy-12,66,24);
  x.fillStyle=C;x.textAlign='center';x.font='16px '+MF;x.fillText(v,px,cy+5);x.fillStyle=LBL;x.font='8px '+SF;x.fillText(l,px,cy-16);}
function win(x,px,y,t){x.strokeStyle=DIM;x.lineWidth=1;x.strokeRect(px-29,y-9,58,18);x.fillStyle=C;x.textAlign='center';x.font='11px '+MF;x.fillText(t,px,y+4);}
function hdgScale(x,cx0,y,hd,w){const span=Math.min(190,w*.26),ppd=3.1;x.save();x.beginPath();x.rect(cx0-span,y-3,span*2,28);x.clip();
  x.strokeStyle=DIM;x.fillStyle=DIM;x.font='9px '+MF;x.textAlign='center';
  for(let d=-40;d<=40;d+=5){let v=Math.round(hd/5)*5+d;const px=cx0+(v-hd)*ppd;v=(v+360)%360;const mj=v%10===0;
    x.globalAlpha=mj?.85:.4;x.beginPath();x.moveTo(px,y+2);x.lineTo(px,y+2+(mj?7:4));x.stroke();
    if(v%30===0)x.fillText(v===0?'N':v===90?'E':v===180?'S':v===270?'W':(''+v/10).padStart(2,'0'),px,y+21);}
  x.restore();x.globalAlpha=1;x.fillStyle=AMBER;x.beginPath();x.moveTo(cx0,y+4);x.lineTo(cx0-5,y-3);x.lineTo(cx0+5,y-3);x.fill();
  x.fillStyle='#04080a';x.strokeStyle=AMBER;x.lineWidth=1.2;x.fillRect(cx0-19,y-22,38,16);x.strokeRect(cx0-19,y-22,38,16);
  x.fillStyle=C;x.font='11px '+MF;x.fillText((''+Math.round(hd)%360).padStart(3,'0'),cx0,y-10);}
function meat(x,px,cy,h){const span=h*.16,tas=Math.max(1,S.tas*.5144),fpa=Math.atan2(-(S.vs*FTM2MS),tas)*57.2958;
  const dev=Math.max(-1,Math.min(1,((-3.5)-fpa)/2.2)),on=Math.abs(dev)<.15,app=S.gear;
  x.globalAlpha=app?1:.4;x.strokeStyle=GREEN;x.lineWidth=2;x.beginPath();
  x.moveTo(px-13,cy);x.lineTo(px-4,cy);x.moveTo(px+4,cy);x.lineTo(px+13,cy);x.stroke();
  x.strokeStyle='#123038';x.lineWidth=1;x.beginPath();x.moveTo(px,cy-span);x.lineTo(px,cy+span);x.stroke();
  const by=cy-dev*span;x.fillStyle=on?GREEN:(Math.abs(dev)>.7?RED:AMBER);x.beginPath();x.arc(px,by,5,0,7);x.fill();x.globalAlpha=1;}
function steer(x,cx,cy,h){const lk=(S.contacts||[]).find(c=>c.locked);if(!lk)return;
  const rel=(lk.brg-S.hdg)*D2R,R=Math.min(h*.30,120),px=cx+Math.sin(rel)*R,py=cy-Math.cos(rel)*R;
  x.strokeStyle=RED;x.lineWidth=1.4;x.beginPath();x.moveTo(px,py-6);x.lineTo(px+6,py);x.lineTo(px,py+6);x.lineTo(px-6,py);x.closePath();x.stroke();
  x.fillStyle=RED;x.font='9px '+MF;x.textAlign='center';x.fillText((lk.rng/1000).toFixed(1)+'km',px,py+18);
  if(S.vc)x.fillText((S.vc>0?'▲':'▼')+Math.abs(Math.round(S.vc)),px,py+29);}

function blip(x,px,py,c){const col=c.type==='H'?RED:c.type==='F'?NAV:AMBER;x.strokeStyle=col;x.fillStyle=col;x.lineWidth=1.5;
  if(c.type==='H')x.strokeRect(px-4,py-4,8,8);else if(c.type==='F'){x.beginPath();x.arc(px,py,4,0,7);x.stroke();}
  else{x.beginPath();x.moveTo(px,py-5);x.lineTo(px+5,py);x.lineTo(px,py+5);x.lineTo(px-5,py);x.closePath();x.stroke();}
  if(c.locked){x.strokeStyle=RED;x.lineWidth=1;x.strokeRect(px-7,py-7,14,14);}}
// datalink track (shared HQ picture) — dashed + dimmer, distinct from own-sensor contacts
function dlBlip(x,px,py,type){const col=type==='F'?'#2a7a8a':type==='H'?'#8a3a38':'#6a5a2a';x.strokeStyle=col;x.lineWidth=1;x.setLineDash([2,2]);
  if(type==='F'){x.beginPath();x.arc(px,py,3.5,0,7);x.stroke();}else{x.strokeRect(px-3,py-3,6,6);}x.setLineDash([]);}
function map(){const{x,w,h}=fit('mapCv');x.clearRect(0,0,w,h);const ox=w/2,oy=h/2,R=Math.min(w,h)*.42,rng=40000,sc=R/rng;
  x.strokeStyle='#0f2831';x.lineWidth=1;for(let g=-2;g<=2;g++){x.globalAlpha=.5;x.beginPath();x.moveTo(ox+g*R/2,oy-R);x.lineTo(ox+g*R/2,oy+R);x.stroke();x.beginPath();x.moveTo(ox-R,oy+g*R/2);x.lineTo(ox+R,oy+g*R/2);x.stroke();}
  x.globalAlpha=1;x.strokeStyle='#123038';[R/2,R].forEach(r=>{x.beginPath();x.arc(ox,oy,r,0,7);x.stroke();});
  (S.datalink||[]).forEach(c=>{const a=c.brg*D2R,r=Math.min(R,c.rng*sc);dlBlip(x,ox+Math.sin(a)*r,oy-Math.cos(a)*r,c.type);});
  (S.contacts||[]).forEach(c=>{const a=c.brg*D2R,r=Math.min(R,c.rng*sc);blip(x,ox+Math.sin(a)*r,oy-Math.cos(a)*r,c);});
  x.save();x.translate(ox,oy);x.rotate(S.hdg*D2R);x.fillStyle=AMBER;x.strokeStyle=AMBER;x.lineWidth=1.6;
  x.beginPath();x.moveTo(0,-9);x.lineTo(-6,7);x.lineTo(0,3);x.lineTo(6,7);x.closePath();x.fill();x.beginPath();x.moveTo(0,-9);x.lineTo(0,-20);x.stroke();x.restore();
  if(S.nav){const a=S.nav.brg*D2R,r=Math.min(R,S.nav.rng*sc),nx=ox+Math.sin(a)*r,ny=oy-Math.cos(a)*r;
    x.strokeStyle=NAV;x.lineWidth=1;x.setLineDash([3,3]);x.beginPath();x.moveTo(ox,oy);x.lineTo(nx,ny);x.stroke();x.setLineDash([]);
    x.beginPath();x.moveTo(nx-5,ny-2);x.lineTo(nx+5,ny-2);x.lineTo(nx+5,ny+2);x.lineTo(nx,ny+6);x.lineTo(nx-5,ny+2);x.closePath();x.stroke();
    x.fillStyle=NAV;x.font='8px '+MF;x.textAlign='left';x.fillText('RTB '+(S.nav.name||'BASE')+' '+(S.nav.rng/1000).toFixed(0)+'km '+(''+Math.round(S.nav.brg)).padStart(3,'0'),8,h-8);}}
function radar(){const{x,w,h}=fit('radarCv');x.clearRect(0,0,w,h);const ox=w/2,oy=h*.64,R=Math.min(w*.44,h*.56),rng=30000,sc=R/rng;
  x.strokeStyle='#123038';x.lineWidth=1;[R/3,2*R/3,R].forEach((r,i)=>{x.beginPath();x.arc(ox,oy,r,-Math.PI,0);x.stroke();x.fillStyle=LBL;x.font='8px '+MF;x.textAlign='left';x.fillText(Math.round(rng/1000*(i+1)/3)+'k',ox+3,oy-r+9);});
  x.beginPath();x.moveTo(ox-R,oy);x.lineTo(ox+R,oy);x.moveTo(ox,oy);x.lineTo(ox,oy-R);x.stroke();x.fillStyle=AMBER;x.beginPath();x.moveTo(ox,oy-7);x.lineTo(ox-5,oy+5);x.lineTo(ox+5,oy+5);x.fill();let lk=null;
  (S.contacts||[]).forEach(c=>{const rel=(c.brg-S.hdg)*D2R;if(Math.cos(rel)<-.05)return;const r=Math.min(R,c.rng*sc),px=ox+Math.sin(rel)*r,py=oy-Math.cos(rel)*r;blip(x,px,py,c);
    if(c.type==='H'&&c.alt!=null){x.fillStyle=DIM;x.font='8px '+MF;x.textAlign='left';x.fillText(Math.round(c.alt/100)*100,px+7,py-1);x.fillText((c.spd||0)+'kt',px+7,py+8);}if(c.locked)lk=c;});
  if(lk){x.fillStyle=RED;x.font='10px '+MF;x.textAlign='left';x.fillText('LOCK '+(lk.name||'TGT'),10,h-28);x.fillStyle=AMBER;x.fillText('RNG '+(lk.rng/1000).toFixed(1)+'km  ALT '+Math.round((lk.alt||0)*3.28)+'ft',10,h-15);}}
function rwr(){document.getElementById('rwrStby').classList.toggle('on',!S._hasRWR);const{x,w,h}=fit('rwrCv');x.clearRect(0,0,w,h);const ox=w/2,oy=h/2+4,R=Math.min(w,h)*.40;
  x.strokeStyle='#123038';x.lineWidth=1;x.beginPath();x.arc(ox,oy,R,0,7);x.stroke();x.beginPath();x.arc(ox,oy,R*.5,0,7);x.stroke();x.beginPath();x.moveTo(ox,oy-R);x.lineTo(ox,oy+R);x.moveTo(ox-R,oy);x.lineTo(ox+R,oy);x.stroke();
  x.fillStyle=AMBER;x.beginPath();x.moveTo(ox,oy-5);x.lineTo(ox-4,oy+4);x.lineTo(ox+4,oy+4);x.fill();if(!S._hasRWR)return;
  (S.rwr||[]).forEach(r=>{const rel=(r.brg-S.hdg)*D2R,rr=R*(r.lock>=2?.9:r.lock===1?.62:.5),px=ox+Math.sin(rel)*rr,py=oy-Math.cos(rel)*rr,col=r.lock>=2?RED:r.lock===1?AMBER:GREEN;
    x.fillStyle=col;x.font='bold 11px '+MF;x.textAlign='center';x.textBaseline='middle';x.fillText(r.band||'?',px,py);if(r.lock>=2){x.strokeStyle=RED;x.lineWidth=1.4;x.beginPath();x.arc(px,py,9,0,7);x.stroke();}});x.textBaseline='alphabetic';}
function machDial(){const{x,w,h}=fit('machDial');x.clearRect(0,0,w,h);const cx=w/2,cy=h/2,R=w*.42;
  x.strokeStyle='#12303a';x.lineWidth=3;x.beginPath();x.arc(cx,cy,R,.75*Math.PI,2.25*Math.PI);x.stroke();
  const f=Math.max(0,Math.min(1,S.mach/2));x.strokeStyle=S.mach>=1?AMBER:C;x.beginPath();x.arc(cx,cy,R,.75*Math.PI,(.75+1.5*f)*Math.PI);x.stroke();}
function damage(){const el=document.getElementById('damage');const d=S.damage;const hurt=d&&(d.hull<.999||Object.values(d.sections||{}).some(v=>v<.999));
  el.classList.toggle('show',!!hurt);if(!hurt)return;const{x,w,h}=fit('damage');x.clearRect(0,0,w,h);
  x.fillStyle=LBL;x.font='9px '+SF;x.textAlign='left';x.fillText('DAMAGE',10,15);const cx=w/2,cy=h/2+6,sc=Math.min(w,h)/150,s=d.sections||{},col=v=>v>.66?'#1c3a37':v>.33?AMBER:RED;x.lineWidth=2;
  x.strokeStyle=col(d.hull);x.beginPath();x.moveTo(cx,cy-42*sc);x.lineTo(cx+6*sc,cy+40*sc);x.lineTo(cx-6*sc,cy+40*sc);x.closePath();x.stroke();
  x.strokeStyle=col(s.lwing??1);x.beginPath();x.moveTo(cx-4*sc,cy-4*sc);x.lineTo(cx-40*sc,cy+14*sc);x.lineTo(cx-6*sc,cy+16*sc);x.stroke();
  x.strokeStyle=col(s.rwing??1);x.beginPath();x.moveTo(cx+4*sc,cy-4*sc);x.lineTo(cx+40*sc,cy+14*sc);x.lineTo(cx+6*sc,cy+16*sc);x.stroke();
  x.strokeStyle=col(s.tail??1);x.beginPath();x.moveTo(cx-12*sc,cy+40*sc);x.lineTo(cx+12*sc,cy+40*sc);x.stroke();}

function trackVc(dt){const lk=(S.contacts||[]).find(c=>c.locked);if(!lk){S._lockRng=null;S.vc=0;return;}
  if(S._lockRng!=null&&dt>0){const closeMs=(S._lockRng-lk.rng)/dt;S.vc=S.vc*0.85+(closeMs*1.94384)*0.15;}S._lockRng=lk.rng;}

function fmt(n){return Math.round(n).toLocaleString('en-US');}
function dom(){S.peakG=Math.max(S.peakG,S.g||0);
  document.getElementById('met').textContent=new Date(Math.max(0,S.met)*1000).toISOString().substr(14,5);
  document.getElementById('kts').textContent=Math.round(S.ias);document.getElementById('kph').textContent=Math.round(S.ias*KT2KPH)+' km/h';
  document.getElementById('mach').textContent=S.mach.toFixed(2);
  document.getElementById('alt').textContent=fmt(S.alt);document.getElementById('altm').textContent=fmt(S.alt*FT2M)+' m';
  const vv=document.getElementById('vs');vv.textContent=(S.vs>=0?'+':'')+fmt(S.vs);vv.className='v'+(S.vs<-200?' amber':'');
  document.getElementById('vsm').textContent=(S.vs*FTM2MS).toFixed(1)+' m/s';
  const gv=document.getElementById('gv');gv.textContent=(S.g||0).toFixed(1)+' ('+(S.peakG).toFixed(1)+')';gv.className='v'+(S.g>7?' red':S.g>5?' amber':'');
  document.getElementById('aoaS').textContent=(S.aoa||0).toFixed(1);
  document.getElementById('thr').textContent=Math.round((S.throttle||0)*100)+'%';
  document.getElementById('eng').textContent=(S.engine||0).toFixed(0)+' kN';
  const lk=(S.contacts||[]).find(c=>c.locked);const tg=document.getElementById('tgt');
  tg.textContent=lk?((lk.rng/1000).toFixed(1)+'km '+(S.vc?((S.vc>0?'+':'')+Math.round(S.vc)):'')):'—';tg.className='v'+(lk?' amber':'');
  document.getElementById('fuel').textContent='FUEL '+fmt(S.fuelKg)+'kg';
  const w=S.weapons&&S.weapons[S.weaponIndex]||{name:'—',ammo:0,unit:''};
  document.getElementById('wN').textContent=w.name;document.getElementById('wA').textContent=w.ammo;document.getElementById('wU').textContent=w.unit||'';
  document.getElementById('wL').innerHTML=(S.weapons||[]).map((x,i)=>`<div class="wr ${i===S.weaponIndex?'sel':''}"><span>${x.name}</span><b>${x.ammo} ${x.unit||''}</b></div>`).join('');
  document.getElementById('flN').textContent=S.flares;document.getElementById('chN').textContent=S.chaff;
  document.getElementById('flB').style.width=(100*S.flares/(S.flaresMax||1))+'%';document.getElementById('chB').style.width=(100*S.chaff/(S.chaffMax||1))+'%';
  document.getElementById('lc').classList.toggle('on',S.caution);document.getElementById('lw').classList.toggle('on',S.warning);
  document.getElementById('lrwr').style.display=(S.rwr||[]).some(r=>r.lock>=2)?'':'none';
  const log=document.getElementById('commsLog');
  if(S._hasChat&&S.chat&&S.chat.length)log.innerHTML=S.chat.slice(-6).map(m=>`<span><b>${esc(m.who||'')}</b> ${esc(m.msg||m)}</span>`).join('');
  else log.innerHTML='<span class="empty">— standby —</span>';}
function esc(s){return(''+s).replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));}

function loop(now){const dt=Math.min(.05,(now-last)/1000);last=now;if(!S.live)sim(dt);trackVc(dt);
  hud();map();radar();rwr();machDial();damage();dom();requestAnimationFrame(loop);}
requestAnimationFrame(loop);

if(location.protocol==='http:'||location.protocol==='https:'){connectLive((location.protocol==='https:'?'wss://':'ws://')+location.host);}

// bi-directional comms: type on this device -> game chat
function sendChat(){const el=document.getElementById('chatIn');const t=(el.value||'').trim();if(!t)return;
  if(S._ws&&S._ws.readyState===1){S._ws.send(JSON.stringify({t:'chat',all:true,text:t}));el.value='';}}
(function(){const el=document.getElementById('chatIn');if(!el)return;
  el.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();sendChat();}});
  const b=document.getElementById('chatSend');if(b)b.addEventListener('click',sendChat);})();

// per-device views + OBS overlay:  ?view=hud|map|radar|rwr   &overlay
(function(){const q=new URLSearchParams(location.search);const v=q.get('view');
  if(v)document.body.classList.add('view-'+v);
  if(q.has('overlay')){document.documentElement.style.background='transparent';document.body.style.background='transparent';}})();

// touchscreen control: buttons -> game commands over the same socket
function sendCmd(a){if(S._ws&&S._ws.readyState===1)S._ws.send(JSON.stringify({t:'cmd',a:a}));}
document.querySelectorAll('.ctrl button').forEach(b=>b.addEventListener('click',()=>sendCmd(b.getAttribute('data-cmd'))));
</script>
</body>
</html>
